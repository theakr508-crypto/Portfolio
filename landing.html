<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Sample Preview</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="background-color: #f4f7f6; color: #333; margin: 0; padding: 0">
    <header
      style="
        padding: 2rem 5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      "
    >
      <div style="font-weight: 700; font-size: 1.5rem; letter-spacing: -1px">
        SaaSFlow
      </div>
      <a href="projects.html" style="color: #666; text-decoration: none"
        >&larr; Back to Portfolio</a
      >
    </header>

    <main
      style="
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5rem;
        max-width: 1400px;
        margin: 0 auto;
        gap: 4rem;
        flex-wrap: wrap;
      "
    >
      <div style="flex: 1; min-width: 400px">
        <span
          style="
            color: var(--color-accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
          "
          >New Release v2.0</span
        >
        <h1
          style="
            font-size: clamp(3rem, 5vw, 4.5rem);
            line-height: 1.1;
            margin: 1.5rem 0;
            color: #111;
          "
        >
          Streamline Your <br />Team's Workflow.
        </h1>
        <p
          style="
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 3rem;
            max-width: 500px;
            line-height: 1.7;
          "
        >
          The ultimate platform for modern teams to collaborate, plan, and
          execute projects seamlessly from anywhere in the world.
        </p>
        <div style="display: flex; gap: 1rem">
          <button
            class="btn"
            style="background: var(--color-accent); color: #fff; border: none"
          >
            Start Free Trial
          </button>
          <button class="btn" style="border-color: #ccc; color: #333">
            Book a Demo
          </button>
        </div>
      </div>

      <div style="flex: 1; min-width: 400px; position: relative">
        <img
          src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&q=80"
          alt="Dashboard Mockup"
          style="
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
          "
        />
      </div>
    </main>
  </body>
</html>
