<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Sample Preview</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      @media (max-width: 768px) {
        header {
          padding: 1rem 1.25rem !important;
          flex-direction: column !important;
          gap: 1rem !important;
          margin-bottom: 2rem !important;
        }
        h1 {
          font-size: 2.5rem !important;
        }
        div[style*="grid-template-columns"] {
          grid-template-columns: 1fr !important;
          gap: 1.5rem !important;
        }
        img {
          height: 280px !important;
        }
      }
    </style>
  </head>
  <body
    style="
      background-color: #0f0f0f;
      color: #f0f0f0;
      text-align: center;
      padding: 2rem;
    "
  >
    <header
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 3rem;
        margin-bottom: 4rem;
      "
    >
      <div style="font-family: var(--font-heading); font-size: 1.5rem">
        Studio
      </div>
      <a
        href="projects.html"
        style="color: #ccc; text-decoration: none; font-size: 0.9rem"
        >&larr; Back to Portfolio</a
      >
    </header>

    <h1 style="color: var(--color-bg); font-size: 4rem; margin-bottom: 1rem">
      Selected Works
    </h1>
    <p style="color: #ccc; margin-bottom: 3rem">
      Visual storytelling through photography and design.
    </p>

    <div
      style="
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 2rem;
        max-width: 1400px;
        margin: 0 auto;
        padding-bottom: 5rem;
      "
    >
      <img
        src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=600&q=80"
        alt="Art piece 1"
        style="
          width: 100%;
          height: 400px;
          object-fit: cover;
          border-radius: 8px;
        "
      />
      <img
        src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600&q=80"
        alt="Art piece 2"
        style="
          width: 100%;
          height: 400px;
          object-fit: cover;
          border-radius: 8px;
        "
      />
      <img
        src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=600&q=80"
        alt="Art piece 3"
        style="
          width: 100%;
          height: 400px;
          object-fit: cover;
          border-radius: 8px;
        "
      />
      <img
        src="https://images.unsplash.com/photo-1506744626753-1fa44df14d28?w=600&q=80"
        alt="Art piece 4"
        style="
          width: 100%;
          height: 400px;
          object-fit: cover;
          border-radius: 8px;
        "
      />
      <img
        src="https://images.unsplash.com/photo-1470770903672-7eca1b0dce28?w=600&q=80"
        alt="Art piece 5"
        style="
          width: 100%;
          height: 400px;
          object-fit: cover;
          border-radius: 8px;
        "
      />
      <img
        src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=80"
        alt="Art piece 6"
        style="
          width: 100%;
          height: 400px;
          object-fit: cover;
          border-radius: 8px;
        "
      />
    </div>
  </body>
</html>
